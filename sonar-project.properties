# SonarQube scanner config for the QA stage (.gitlab-ci.yml `sonarqube`).
# Host + token come from CI variables (SONAR_HOST_URL / SONAR_TOKEN) —
# intentionally NOT set here so no server URL is committed. Override the
# projectKey via -Dsonar.projectKey=… if your instance uses another key.
sonar.projectKey=container-build-template
sonar.projectName=container-build-template
sonar.sources=scripts
sonar.exclusions=**/*.md,certs/**,**/__pycache__/**
sonar.sourceEncoding=UTF-8
