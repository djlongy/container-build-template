# ═══════════════════════════════════════════════════════════════════
# INGEST — post SBOM + vuln scan to configured sinks
# ═══════════════════════════════════════════════════════════════════
# Two parallel ingest jobs, one per artifact type. Both are no-ops
# when no sink env vars are set. Same producer-vs-consumer split as
# the scan stages.
#
# sbom-ingest  → scripts/ingest/sbom-post.sh — webhook / Dependency-
#                Track / Artifactory SBOM repo + archive / Splunk HEC.
#                Default consumer is syft-sbom-postscan; swap to
#                xray-sbom-postscan or trivy-sbom-postscan for a
#                different producer (all write the same SBOM_FILE).
#
# vuln-ingest  → scripts/ingest/vuln-post.sh — webhook / Artifactory
#                generic archive / Splunk HEC. Scanner-agnostic:
#                auto-detects whether the report came from grype /
#                trivy / xray (by report shape) and picks a sensible
#                Splunk sourcetype.
sbom-ingest:
  stage: ingest
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
    - job: syft-sbom-postscan
      artifacts: true
  before_script:
    - *install-tools
  script:
    - set -a; . ./build.env; set +a   # auto-export build.env vars to spawned subshells (build.env is dotenv-clean — no `export ` prefix, required by GitLab's reports.dotenv parser)
    - bash ./scripts/ingest/sbom-post.sh "${SBOM_FILE}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  allow_failure: true

vuln-ingest:
  stage: ingest
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
    - job: grype-vuln
      artifacts: true
  before_script:
    - *install-tools
  script:
    - set -a; . ./build.env; set +a   # auto-export build.env vars to spawned subshells (build.env is dotenv-clean — no `export ` prefix, required by GitLab's reports.dotenv parser)
    - bash ./scripts/ingest/vuln-post.sh "${VULN_SCAN_FILE}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  allow_failure: true
