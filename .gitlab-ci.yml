# ─── PIPELINE CONFIG ───────────────────────────────────────────────
# Vendored from container-build-template. Edit only when adding /
# removing pipeline jobs. Behavioural knobs (registry, scan severity,
# SBOM sinks, etc.) live in image.env — not here.
# ───────────────────────────────────────────────────────────────────
#
# Single-image build + DevSecOps pipeline. Everything inline — no
# includes, no template indirection. A newcomer can read this one
# file and see the entire flow.
#
# Pipeline shape (6 stages; sign commented out, promote dropped):
#   qa        → shellcheck (always) + SonarQube (opt-in, set
#               SONAR_HOST_URL + SONAR_TOKEN) static-analyse the
#               framework scripts before anything builds.
#   prescan   → scan UPSTREAM_REF before build. 3 SBOM + 2 vuln
#               producers run in parallel; downstream picks up via
#               canonical SBOM_FILE / VULN_SCAN_FILE.
#                 xray-vuln-prescan, xray-sbom-prescan, syft-sbom-prescan
#                 (dormant: trivy-vuln-prescan, trivy-sbom-prescan)
#   build     → docker build + push via REGISTRY_KIND dispatch
#               (scripts/push-backends/<harbor|artifactory>.sh).
#               Emits build.env with SBOM_FILE / VULN_SCAN_FILE.
#   postscan  → scan the BUILT image (IMAGE_DIGEST from build.env).
#                 syft-sbom-postscan, xray-sbom-postscan,
#                 xray-vuln-postscan, grype-vuln, grype-db-sync
#                 (dormant: trivy-vuln-postscan, trivy-sbom-postscan)
#   sign      → cosign-sign (dormant — commented)
#   ingest    → sbom-ingest (ships sbom.cdx.json to configured sinks)
#
# Variable precedence: shell / CI vars > image.env. Only SECRETS need
# to be masked CI variables (see README "Required CI variables —
# secrets only"). Everything else lives in image.env.
#
# Production promotion is INTENTIONALLY not in this pipeline — manual
# ritual via Artifactory's native copy UI. See README "Promoting to
# production".

stages:
  - qa           # shellcheck (always) + SonarQube (opt-in) of the framework
  - prescan      # Xray scan + SBOM of UPSTREAM_REF
  - build
  - postscan     # Xray scan + SBOM of the BUILT image, Syft SBOM, Grype
  - sign         # COMMENTED OUT — no cosign infra yet
  - ingest       # sbom-ingest + vuln-ingest → configured sinks

# ── Path gate ──────────────────────────────────────────────────────
# Pipeline only runs when something image-relevant changed. Editing
# README, LICENSE, renovate.json, bamboo-specs/, .gitignore won't
# trigger a build. Tag pushes and FORCE_ALL=true bypass the gate.
.build-changes: &build-changes
  - image.env
  - image.env.example
  - Dockerfile.example
  - scripts/**/*
  - certs/**/*
  - .gitlab-ci.yml

.build-rules: &build-rules
  - if: '$FORCE_ALL == "true"'
  - if: '$CI_COMMIT_TAG'
  - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    changes: *build-changes
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes: *build-changes

# Pipeline-level gate — without this, GitLab still creates an empty
# (red) "container" pipeline when all jobs are filtered out by path
# rules. Match build-rules so pushes that touch no watched file
# produce no pipeline at all.
workflow:
  rules:
    - if: '$FORCE_ALL == "true"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: *build-changes
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *build-changes

variables:
  # docker:dind TLS disabled — matches internal runners that don't
  # mount /certs/client between dind service and job container.
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

  # ── Canonical artifact filenames ────────────────────────────────
  # Mirror scripts/lib/artifact-names.sh defaults. CI YAML can't
  # `source` shell files so they're duplicated here. If you ever
  # rename them, update both places.
  SBOM_FILE: "sbom.cdx.json"
  VULN_SCAN_FILE: "vuln-scan.json"

  # ── Air-gap configuration ───────────────────────────────────────
  # Every runtime download is overridable via group/project CI vars.
  # Defaults point at public sources — override for internal mirrors.
  DOCKER_CLI_IMAGE: "docker:27-cli"
  DOCKER_DIND_IMAGE: "docker:27-dind"
  ALPINE_IMAGE: "alpine:3.20"

  CRANE_URL: "https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz"
  # Tool versions: empty = script's built-in default. Override per
  # pipeline by setting as a project/group CI variable.
  SYFT_INSTALLER_URL: "https://raw.githubusercontent.com/anchore/syft/main/install.sh"
  SYFT_VERSION: ""
  GRYPE_INSTALLER_URL: "https://raw.githubusercontent.com/anchore/grype/main/install.sh"
  GRYPE_VERSION: ""
  COSIGN_URL: "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64"
  # JFrog CLI — sudoless. Set ONE of the three to a file in your
  # local Artifactory. Lands in ${JF_INSTALL_DIR:-$HOME/.local/bin}.
  JF_BINARY_URL: ""
  JF_DEB_URL: ""
  JF_RPM_URL: ""
  JF_INSTALL_DIR: ""

  # Splunk HEC for Xray scan audit (xray-vuln.sh / sbom-post.sh).
  # Both URL + TOKEN required to actually ship. Keep TOKEN masked.
  SPLUNK_HEC_URL: ""
  SPLUNK_HEC_INDEX: "main"
  SPLUNK_HEC_SOURCETYPE: "jfrog:xray:scan"
  SPLUNK_HEC_INSECURE: "false"

  BUILD_DEBUG: "false"
  # Grype DB air-gap. ARTIFACTORY_GRYPE_DB_REPO set = grype-db-sync
  # mirrors the Anchore DB to that repo and grype-vuln pulls from it.
  ARTIFACTORY_GRYPE_DB_REPO: ""
  GRYPE_DB_MIRROR_SUBPATH: "grype-db/v6"

# ═══════════════════════════════════════════════════════════════════
# QA STAGE — static analysis of the framework itself (runs first)
# ═══════════════════════════════════════════════════════════════════
# shellcheck always runs (no infra, no secrets). SonarQube is OPT-IN:
# its job only materialises where SONAR_HOST_URL + SONAR_TOKEN are set
# as CI variables, so no internal Sonar URL is ever committed and the
# public mirror simply skips it.

shellcheck:
  stage: qa
  image: koalaman/shellcheck-alpine:stable
  script:
    - shellcheck --version
    # -x follows `source`d libs. Gate at warning+ (errors + warnings
    # fail the pipeline); info/style remain advisory.
    - shellcheck -x -S warning $(find . -name '*.sh' -type f | sort)
  rules: *build-rules

sonarqube:
  stage: qa
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"          # full history → accurate blame/new-code
  cache:
    key: "sonar-cache"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}" -Dsonar.token="${SONAR_TOKEN}"
  allow_failure: true       # QA signal, never blocks the build
  rules:
    # Opt-in: host + token come from CI variables (internal only).
    - if: '$SONAR_HOST_URL && $SONAR_TOKEN'

# ── Shared before_script: install tools used by most jobs ──────────
.install-tools: &install-tools
  - |
    # Skip apk-add when every tool is already on PATH. Set ALPINE_IMAGE
    # to a pre-baked image (bash/git/curl/openssl/jq/python3/crane) to
    # avoid any dl-cdn.alpinelinux.org fetch. python3 is needed by
    # scripts/push-backends/artifactory.sh (build-info-merge.py).
    if command -v bash >/dev/null 2>&1 \
       && command -v git >/dev/null 2>&1 \
       && command -v curl >/dev/null 2>&1 \
       && command -v openssl >/dev/null 2>&1 \
       && command -v jq >/dev/null 2>&1 \
       && command -v python3 >/dev/null 2>&1; then
      echo "→ tools already on PATH — skipping apk add (pre-baked image)"
    else
      apk add --no-cache bash git curl openssl jq python3
    fi
  - |
    # crane — used by build.sh for base.digest. Sudoless install into
    # $HOME/.local/bin. Auth added when ARTIFACTORY_USER + PASSWORD set
    # (CRANE_URL pointing at an internal Artifactory mirror).
    mkdir -p "${HOME}/.local/bin"
    export PATH="${HOME}/.local/bin:${PATH}"
    if ! command -v crane >/dev/null 2>&1; then
      # -fsL: -f fails fast on HTTP errors (prevents HTML-error-body
      # → tar: invalid magic), -s silent, -L follow redirects.
      if [ -n "${ARTIFACTORY_USER:-}" ] && [ -n "${ARTIFACTORY_PASSWORD:-}" ]; then
        curl -fsL -u "${ARTIFACTORY_USER}:${ARTIFACTORY_PASSWORD}" "${CRANE_URL}" | tar xz -C "${HOME}/.local/bin/" crane
      else
        curl -fsL "${CRANE_URL}" | tar xz -C "${HOME}/.local/bin/" crane
      fi
    fi
  - |
    # Source image.env with shell-wins-over-file precedence so CI vars
    # / pipeline-trigger vars override image.env values. GitLab's
    # default shell is busybox /bin/sh, which can't run our bash-only
    # load-image-env.sh — implement the same algorithm in pure POSIX.
    #
    # Algorithm: snapshot non-empty shell vars (base64-encoded for
    # safe round-trip), source image.env, restore the snapshot.
    if [ -f image.env ]; then
      _IMG_KEYS=$(grep -oE '^[A-Z_][A-Z0-9_]*=' image.env | sed 's/=$//' | sort -u)
      _IMG_SNAP=$(mktemp)
      for k in $_IMG_KEYS; do
        eval "_v=\"\${${k}:-}\""
        if [ -n "${_v}" ]; then
          # Use a tab between key and value — base64 output never
          # contains tabs but DOES contain `=` padding.
          printf '%s\t%s\n' "${k}" "$(printf '%s' "${_v}" | base64 | tr -d '\n')" >> "${_IMG_SNAP}"
        fi
      done
      set -a; . ./image.env; set +a
      while read -r _line; do
        _rk="${_line%%	*}"   # literal TAB inside the braces
        _rv="${_line#*	}"
        _rdec=$(printf '%s' "${_rv}" | base64 -d)
        eval "${_rk}=\"\${_rdec}\""
        export "${_rk}"
      done < "${_IMG_SNAP}"
      rm -f "${_IMG_SNAP}"
      unset _IMG_KEYS _IMG_SNAP _v _line _rk _rv _rdec
    fi
  - |
    # Write ~/.docker/config.json so syft/crane can pull the BASE image
    # in dind-less scan jobs. Same upstream-auth resolution as
    # scripts/lib/docker-login.sh: explicit UPSTREAM_REGISTRY_* → else
    # same-domain ARTIFACTORY_* → else anonymous (creds never go to a
    # public registry). See README "Required CI variables".
    _UPS_REF="${UPSTREAM_REGISTRY:-${UPSTREAM_REF:-}}"
    _UPS_HOST="${_UPS_REF%%/*}"
    _UPS_USER=""; _UPS_PASS=""; _UPS_SRC=""
    if [ -n "${UPSTREAM_REGISTRY_USER:-}" ] && [ -n "${UPSTREAM_REGISTRY_PASSWORD:-}" ]; then
      _UPS_USER="${UPSTREAM_REGISTRY_USER}"; _UPS_PASS="${UPSTREAM_REGISTRY_PASSWORD}"; _UPS_SRC="UPSTREAM_REGISTRY_USER"
    elif [ -n "${ARTIFACTORY_USER:-}" ] && [ -n "${_UPS_HOST}" ]; then
      _ART_SECRET="${ARTIFACTORY_TOKEN:-${ARTIFACTORY_PASSWORD:-}}"
      _ART_HOST="${ARTIFACTORY_URL#*://}"; _ART_HOST="${_ART_HOST%%/*}"
      _ART_APEX=$(printf '%s' "${_ART_HOST}" | rev | cut -d. -f1,2 | rev)
      if [ -n "${_ART_SECRET}" ] && [ -n "${_ART_HOST}" ]; then
        case "${_UPS_HOST}" in
          "${_ART_HOST}"|"${_ART_APEX}"|*".${_ART_APEX}")
            _UPS_USER="${ARTIFACTORY_USER}"; _UPS_PASS="${_ART_SECRET}"; _UPS_SRC="ARTIFACTORY_USER (same domain)" ;;
        esac
      fi
    fi
    if [ -n "${_UPS_HOST}" ] && [ -n "${_UPS_USER}" ] && [ -n "${_UPS_PASS}" ]; then
      AUTH=$(printf '%s:%s' "${_UPS_USER}" "${_UPS_PASS}" | base64 | tr -d '\n')
      mkdir -p "${HOME}/.docker"
      printf '{"auths":{"%s":{"auth":"%s"}}}\n' "${_UPS_HOST}" "${AUTH}" > "${HOME}/.docker/config.json"
      chmod 600 "${HOME}/.docker/config.json"
      echo "→ wrote ~/.docker/config.json for ${_UPS_HOST} (${_UPS_SRC})"
    else
      echo "→ no upstream creds for ${_UPS_HOST:-<none>} — base image pulled anonymously"
    fi

# ═══════════════════════════════════════════════════════════════════
# BUILD
# ═══════════════════════════════════════════════════════════════════
build:
  stage: build
  image: ${DOCKER_CLI_IMAGE}
  services:
    - name: ${DOCKER_DIND_IMAGE}
      alias: docker
  before_script:
    - *install-tools
  script:
    # Branch-aware push: only default branch + tags push to registry.
    # Feature/MR pipelines build + scan as validation without pushing
    # so short-lived branches don't pollute the registry. build.sh's
    # no-push path still emits build.env with IMAGE_REF=UPSTREAM_REF
    # for downstream postscan jobs.
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] || [ -n "$CI_COMMIT_TAG" ]; then
        bash ./scripts/build.sh --push --dockerfile Dockerfile.example
      else
        bash ./scripts/build.sh --dockerfile Dockerfile.example
      fi
  artifacts:
    # Downstream jobs both `. ./build.env` AND consume the dotenv-
    # imported env vars. Expose as file + dotenv report so both work.
    paths:
      - build.env
    reports:
      dotenv: build.env
    expire_in: 1 week
  rules: *build-rules

# ═══════════════════════════════════════════════════════════════════
# POSTSCAN — Syft SBOM of the BUILT image
# ═══════════════════════════════════════════════════════════════════
# Writes canonical sbom.cdx.json (filename from build.env's SBOM_FILE).
# Swap to scripts/scan/xray-sbom.sh or trivy-sbom.sh and downstream
# Grype + sbom-post stages keep working — they read the same SBOM_FILE.
syft-sbom-postscan:
  stage: postscan
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
  before_script:
    - *install-tools
  script:
    # set -a auto-exports the plain KEY=VALUE lines into spawned
    # `bash ./scripts/...` subshells. GitLab also dotenv-injects them
    # via reports.dotenv — this is belt-and-braces.
    - set -a; . ./build.env; set +a   # auto-export build.env vars to spawned subshells (build.env is dotenv-clean — no `export ` prefix, required by GitLab's reports.dotenv parser)
    - bash ./scripts/scan/syft-sbom.sh
  artifacts:
    paths:
      - ${SBOM_FILE}
    reports:
      cyclonedx: ${SBOM_FILE}
    expire_in: 1 month
  rules: *build-rules

# ═══════════════════════════════════════════════════════════════════
# PRESCAN — Syft SBOM of UPSTREAM_REF (before build runs)
# ═══════════════════════════════════════════════════════════════════
# Same script, different target — early visibility on the upstream's
# component graph without waiting for the build.
syft-sbom-prescan:
  stage: prescan
  image: ${ALPINE_IMAGE}
  needs: []
  before_script:
    - *install-tools
  script:
    - |
      export SBOM_SCAN_REF="${UPSTREAM_REF}"
      bash ./scripts/scan/syft-sbom.sh
  artifacts:
    paths:
      - sbom.cdx.json
    expire_in: 1 month
    when: always
  rules: *build-rules

# ═══════════════════════════════════════════════════════════════════
# POSTSCAN — Grype DB mirror (optional, air-gap)
# ═══════════════════════════════════════════════════════════════════
# Mirrors the Anchore Grype CVE DB to an Artifactory generic repo so
# the grype job fetches without reaching grype.anchore.io. Only runs
# when ARTIFACTORY_GRYPE_DB_REPO is set — otherwise grype downloads
# directly from Anchore's public CDN.
grype-db-sync:
  stage: postscan
  image: ${ALPINE_IMAGE}
  needs: []
  rules:
    - if: '$ARTIFACTORY_GRYPE_DB_REPO != "" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$ARTIFACTORY_GRYPE_DB_REPO != "" && $CI_PIPELINE_SOURCE == "schedule"'
    - when: never
  before_script:
    - *install-tools
  script:
    - ./scripts/sync/mirror-grype-db.sh

# ═══════════════════════════════════════════════════════════════════
# POSTSCAN — Grype vulnerability scan (consumes Syft SBOM)
# ═══════════════════════════════════════════════════════════════════
# Grype reads the CycloneDX SBOM (no image re-pull) and matches
# components against its vulnerability DB. Set GRYPE_FAIL_ON_SEVERITY
# in image.env / CI var to make this a hard gate.
grype-vuln:
  stage: postscan
  image: ${ALPINE_IMAGE}
  needs:
    - job: build
      artifacts: true
    - job: syft-sbom-postscan
      artifacts: true
    - job: grype-db-sync
      optional: true
  before_script:
    - *install-tools
  script:
    - set -a; . ./build.env; set +a   # auto-export build.env vars to spawned subshells (build.env is dotenv-clean — no `export ` prefix, required by GitLab's reports.dotenv parser)
    - bash ./scripts/scan/grype-vuln.sh
  artifacts:
    paths:
      - ${VULN_SCAN_FILE}
    expire_in: 1 month
  rules: *build-rules

# ═══════════════════════════════════════════════════════════════════
# PRESCAN — Xray on UPSTREAM_REF, gated, BEFORE build runs
# ═══════════════════════════════════════════════════════════════════
# Two jobs that scan the upstream image we're about to rebuild. They
# run in prescan so a critical CVE in the upstream fails the pipeline
# BEFORE build wastes runner time. Set XRAY_FAIL_ON_SEVERITY in
# image.env to enforce a real gate; leave unset for audit-only.
#
# Both pass UPSTREAM_REF explicitly via XRAY_SCAN_REF so the script's
# resolution chain doesn't fall back to IMAGE_DIGEST (build hasn't run).
.xray-anchor: &xray-anchor
  image: ${DOCKER_CLI_IMAGE}
  services:
    - name: ${DOCKER_DIND_IMAGE}
      alias: docker
  variables:
    # Move jf's home dir INTO the project so GitLab cache can persist
    # the Xray Analyzer Manager (~300MB) across job runs. Without
    # this, each xray job re-downloads it and 4 jobs × 300MB fills
    # the runner disk.
    JFROG_CLI_HOME_DIR: "${CI_PROJECT_DIR}/.jfrog-cli-home"
  cache:
    # Static key shared across branches so the first xray job's
    # analyzer download is reused by every subsequent job. Bump the
    # suffix when you upgrade JF_BINARY_URL (jf CLI version) to
    # invalidate.
    key: jfrog-deps-cache-v1
    paths:
      - .jfrog-cli-home/dependencies/
    policy: pull-push
  before_script:
    - *install-tools
  rules: *build-rules
  # Concurrency note: if your Xray instance is a shared trial /
  # under-provisioned, add `resource_group: xray-scan` to serialise
  # every xray-* job. On properly-provisioned Pro / self-hosted Xray,
  # concurrent scans cut pipeline wall time by ~50%.
  # Policy-gate note: when XRAY_FAIL_ON_SEVERITY is set, the script
  # exits 2 on violation. To make THAT a real gate, set allow_failure:
  # false on xray-vuln-prescan only. Postscan jobs stay allow_failure:
  # true (audit shipping is non-blocking).
  allow_failure: true

xray-vuln-prescan:
  <<: *xray-anchor
  stage: prescan
  needs: []      # no build artifacts — scans UPSTREAM_REF
  script:
    - |
      export XRAY_SCAN_REF="${UPSTREAM_REF}"
      bash ./scripts/scan/xray-vuln.sh
  artifacts:
    paths:
      - ${VULN_SCAN_FILE}
    expire_in: 1 month
    when: always

xray-sbom-prescan:
  <<: *xray-anchor
  stage: prescan
  needs: []
  script:
    - |
      export XRAY_SCAN_REF="${UPSTREAM_REF}"
      bash ./scripts/scan/xray-sbom.sh
  artifacts:
    paths:
      - ${SBOM_FILE}
    expire_in: 1 month
    when: always

# ═══════════════════════════════════════════════════════════════════
# POSTSCAN — Xray on the BUILT image (IMAGE_DIGEST)
# ═══════════════════════════════════════════════════════════════════
# Runs AFTER build. Scans what consumers will actually pull, including
# cert injection + Dockerfile FORK EDITS. Scripts default to scanning
# IMAGE_DIGEST (from build.env via dotenv), so no XRAY_SCAN_REF needed.
xray-vuln-postscan:
  <<: *xray-anchor
  stage: postscan
  needs:
    - job: build
      artifacts: true
  script:
    - bash ./scripts/scan/xray-vuln.sh
  artifacts:
    paths:
      - ${VULN_SCAN_FILE}
    expire_in: 1 month
    when: always

xray-sbom-postscan:
  <<: *xray-anchor
  stage: postscan
  needs:
    - job: build
      artifacts: true
  script:
    - bash ./scripts/scan/xray-sbom.sh
  artifacts:
    paths:
      - ${SBOM_FILE}
    expire_in: 1 month
    when: always

# ═══════════════════════════════════════════════════════════════════
