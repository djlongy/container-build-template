# ═══════════════════════════════════════════════════════════════════
# INGEST — post SBOM + vuln scan to configured sinks
# ═══════════════════════════════════════════════════════════════════
# Two parallel ingest jobs, same pattern. No-op when no sink env
# vars set. `|| true` mirrors GitLab's allow_failure: true — sinks
# are best-effort.
SBOM Ingest:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
          - name: sbom
            destination: .
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -a; . ./build.env; set +a   # auto-export build.env vars to spawned subshells (build.env is dotenv-clean — no `export ` prefix, required by GitLab's reports.dotenv parser)
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            # Ingest only on the default branch (mirrors GitLab's
            # `$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH` rule). Feature
            # branches build + scan (pipeline still completes green) but
            # do NOT post — only main pushes a real artifact, so only main
            # ships results to the sinks (no duplicate/upstream Splunk noise).
            case "${bamboo_planRepository_branchName:-}" in
              main|master) : ;;
              *) echo "→ Ingest skipped on non-default branch '${bamboo_planRepository_branchName:-?}' — only main/master posts to sinks"; exit 0 ;;
            esac

            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_PASSWORD="${bamboo_svc_artifactory_password:-${bamboo_ARTIFACTORY_PASSWORD:-}}"
            export DEPENDENCY_TRACK_API_KEY="${bamboo_svc_dependency_track_api_key:-${bamboo_DEPENDENCY_TRACK_API_KEY:-}}"
            export SBOM_WEBHOOK_AUTH_HEADER="${bamboo_svc_sbom_webhook_auth_header:-${bamboo_SBOM_WEBHOOK_AUTH_HEADER:-}}"
            export SPLUNK_HEC_TOKEN="${bamboo_svc_splunk_hec_token:-${bamboo_SPLUNK_HEC_TOKEN:-}}"

            bash ./scripts/ingest/sbom-post.sh "${SBOM_FILE}" || true
  requirements:
    - system.docker.executable

Vuln Ingest:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
          - name: vuln-scan-grype
            destination: .
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -a; . ./build.env; set +a   # auto-export build.env vars to spawned subshells (build.env is dotenv-clean — no `export ` prefix, required by GitLab's reports.dotenv parser)
            [ "${SKIP:-false}" = "true" ] && { echo "SKIP=true — no-op"; exit 0; }

            # Ingest only on the default branch (mirrors GitLab). Feature
            # branches build + scan but do NOT post — see Sbom Ingest note.
            case "${bamboo_planRepository_branchName:-}" in
              main|master) : ;;
              *) echo "→ Ingest skipped on non-default branch '${bamboo_planRepository_branchName:-?}' — only main/master posts to sinks"; exit 0 ;;
            esac

            export ARTIFACTORY_USER="${bamboo_svc_artifactory_user:-${bamboo_ARTIFACTORY_USER:-}}"
            export ARTIFACTORY_TOKEN="${bamboo_svc_artifactory_token:-${bamboo_ARTIFACTORY_TOKEN:-}}"
            export ARTIFACTORY_PASSWORD="${bamboo_svc_artifactory_password:-${bamboo_ARTIFACTORY_PASSWORD:-}}"
            export VULN_WEBHOOK_AUTH_HEADER="${bamboo_svc_vuln_webhook_auth_header:-${bamboo_VULN_WEBHOOK_AUTH_HEADER:-}}"
            export SPLUNK_HEC_TOKEN="${bamboo_svc_splunk_hec_token:-${bamboo_SPLUNK_HEC_TOKEN:-}}"

            bash ./scripts/ingest/vuln-post.sh "${VULN_SCAN_FILE}" || true
  requirements:
    - system.docker.executable
